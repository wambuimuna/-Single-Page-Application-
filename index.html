<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLens - World Explorer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { light: '#3b82f6', dark: '#60a5fa' }
                    }
                }
            }
        }
    </script>

    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .country-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            backface-visibility: hidden;
        }
        .country-card:hover { transform: translateY(-5px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-gray-800 shadow-md sticky top-0 z-40 border-b border-gray-100 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" id="logoBrand">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fa-solid fa-earth-africa text-white text-xl"></i>
                </div>
                <span class="font-black text-2xl tracking-tighter uppercase">Geo<span class="text-blue-600">Lens</span></span>
            </div>

            <button id="themeToggle" class="p-2.5 rounded-full bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">
                <i id="themeIcon" class="fa-solid fa-moon text-gray-600 dark:text-yellow-400 text-lg"></i>
            </button>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 py-10">
        <div class="mb-10">
            <h1 class="text-4xl font-extrabold mb-2 tracking-tight">Global Directory</h1>
            <p class="text-gray-500 dark:text-gray-400">Instant access to data for over 250 regions.</p>
        </div>

        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <div class="relative flex-grow">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" class="w-full pl-12 pr-4 py-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all shadow-sm" placeholder="Search countries or capitals...">
            </div>
            <select id="regionFilter" class="px-4 py-4 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl outline-none cursor-pointer shadow-sm">
                <option value="all">Filter by Region</option>
                <option value="Africa">Africa</option>
                <option value="Americas">Americas</option>
                <option value="Asia">Asia</option>
                <option value="Europe">Europe</option>
                <option value="Oceania">Oceania</option>
            </select>
        </div>

        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-4"></div>
            <p class="text-gray-400 font-medium">Fetching country data...</p>
        </div>

        <div id="countriesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        
        <div id="noResults" class="hidden text-center py-20">
            <i class="fa-solid fa-face-frown text-4xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-bold text-gray-400">No matching countries found</h3>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="fixed inset-0 bg-black/70 backdrop-blur-sm" id="modalOverlay"></div>
        <div class="bg-white dark:bg-gray-800 w-full max-w-3xl rounded-3xl overflow-hidden shadow-2xl relative z-10 flex flex-col md:flex-row max-h-[90vh]">
            <button id="closeModalBtn" class="absolute top-4 right-4 w-10 h-10 rounded-full bg-white/20 hover:bg-white/40 flex items-center justify-center z-20 backdrop-blur-md text-white md:text-gray-500">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div id="modalContent" class="flex flex-col md:flex-row w-full overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
